services:
  - type: web
    name: mediflow-backend
    runtime: docker              # uses the repo's Dockerfile
    dockerfilePath: ./Dockerfile # explicit path (default, but stated for clarity)
    plan: starter                # ~500 MB image — fits comfortably on starter
    numInstances: 1
    envVars:
      # Set these in the Render dashboard – never commit real values
      - key: PYTHONPATH
        value: /app
      - key: ENVIRONMENT
        value: production
      - key: NVIDIA_EMBED_API_KEY
        sync: false
      - key: NVIDIA_API_KEY
        sync: false
      - key: CEREBRAS_API_KEY
        sync: false
      - key: PGVECTOR_DATABASE_URL
        sync: false              # paste your Supabase connection string here
      - key: ALLOWED_ORIGIN
        sync: false              # paste your Vercel URL, e.g. https://mediflow.vercel.app
      - key: SUPABASE_URL
        sync: false              # https://your-project-ref.supabase.co
      - key: SUPABASE_SERVICE_KEY
        sync: false              # service_role key from Supabase Settings → API
      - key: SUPABASE_ANON_KEY
        sync: false              # anon/public key from Supabase Settings → API
      - key: LOG_LEVEL
        value: INFO
